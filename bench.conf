# hyperbench: minimal, deterministic config for the nested benchmark instance.
# No user config is loaded; every option an evaluator depends on is pinned here.

monitor = , preferred, auto, 1

animations {
    enabled = false
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

debug {
    disable_logs = false
}
