<!doctype html>
<!-- cv-drag-slider: a custom-drawn slider (no <input>, pure canvas).
     Skill: grab the knob and drag it until the readout shows the asked
     value. Track position is seeded; value is continuous 0-100. -->
<html>
<head><meta charset="utf-8"><title>canvas slider</title>
<style>body{margin:0;background:#222}canvas{display:block;margin:24px auto;background:#181818}</style>
</head>
<body>
<canvas id="c" width="640" height="400"></canvas>
<script src="cv-common.js"></script>
<script>
  const c = document.getElementById('c'), g = c.getContext('2d');
  const rnd = cvRng();
  const track = {
    x: 60 + rnd() * 80,
    y: 80 + rnd() * 240,
    w: 400 + rnd() * 120,
  };
  const KNOB = 14;
  let value = Math.floor(rnd() * 30); // starts somewhere low
  const goal = 60 + Math.floor(rnd() * 31); // asked value, 60..90

  function knobX() { return track.x + (value / 100) * track.w; }
  function draw() {
    g.clearRect(0, 0, c.width, c.height);
    g.fillStyle = '#444';
    g.fillRect(track.x, track.y - 3, track.w, 6);
    g.beginPath();
    g.arc(knobX(), track.y, KNOB, 0, 7);
    g.fillStyle = '#8ef0d2';
    g.fill();
    g.fillStyle = '#ccdfdb';
    g.font = '20px monospace';
    g.fillText(`value: ${Math.round(value)}`, track.x, track.y - 30);
    g.fillText(`set to: ${goal}`, track.x, track.y - 56);
  }
  draw();

  window.__cv.expect = { goal, track };
  window.__cv.result = { value, grabbed: false };

  let dragging = false;
  cvWire(c, (pt) => {
    if (cvDist(pt, { x: knobX(), y: track.y }) <= KNOB + 4) {
      dragging = true;
      window.__cv.result.grabbed = true;
    }
  });
  c.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const r = c.getBoundingClientRect();
    const x = e.clientX - r.left;
    value = Math.max(0, Math.min(100, ((x - track.x) / track.w) * 100));
    window.__cv.result.value = value;
    draw();
  });
  addEventListener('pointerup', () => { dragging = false; });
</script>
</body>
</html>
