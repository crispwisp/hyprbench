name: no-ai-cosign
# House rule 2: no AI co-author trailers or AI authorship in history — ever.
# Local enforcement exists (commit-msg hook, includeCoAuthoredBy=false), but
# hooks don't follow clones; this is the safeguard that does. Checks author
# and committer identities plus Co-authored-by trailers across the entire
# history. Deliberately does NOT scan message bodies: commits may legitimately
# mention AI tooling (agent adapters, model names) — the rule is about
# attribution, not vocabulary.

on:
  push:
  pull_request:

jobs:
  scrub-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: refuse AI attribution in history
        run: |
          set -u
          bad=0
          ids=$(git log --all --format='%H %an <%ae> / %cn <%ce>' \
                | grep -iE 'claude|anthropic' || true)
          if [ -n "$ids" ]; then
            echo "::error::AI identity in author/committer fields:"
            echo "$ids"
            bad=1
          fi
          trailers=$(git log --all --format='%H %(trailers:key=Co-authored-by,valueonly,separator=; )' \
                | awk 'NF > 1' | grep -iE 'claude|anthropic' || true)
          if [ -n "$trailers" ]; then
            echo "::error::AI co-author trailer found:"
            echo "$trailers"
            bad=1
          fi
          [ "$bad" -eq 0 ] && echo "history clean: no AI attribution"
          exit "$bad"
